<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로또 번호 생성기</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <div class="container">
    <div class="theme-toggle">
      <button id="theme-btn" aria-label="Toggle theme">🌙</button>
    </div>
    <h1>로또 번호 생성기</h1>
    <div id="lotto-container" class="lotto-container">
      <div class="ball placeholder">?</div>
      <div class="ball placeholder">?</div>
      <div class="ball placeholder">?</div>
      <div class="ball placeholder">?</div>
      <div class="ball placeholder">?</div>
      <div class="ball placeholder">?</div>
    </div>
    <button id="generate-btn">번호 생성하기</button>

    <hr class="divider">

    <div class="contact-section">
      <h3>제휴 문의</h3>
      <form action="https://formspree.io/f/xjgjwjqy" method="POST" id="contact-form">
        <div class="form-group">
          <input type="text" name="name" placeholder="성함/업체명" required>
        </div>
        <div class="form-group">
          <input type="email" name="_replyto" placeholder="이메일 주소" required>
        </div>
        <div class="form-group">
          <textarea name="message" placeholder="문의 내용을 입력해주세요" required></textarea>
        </div>
        <button type="submit" class="submit-btn">문의 보내기</button>
      </form>
    </div>
  </div>
  <script defer src="/main.js"></script>
</body>
</html>
