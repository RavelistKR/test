<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ravelist 부동산 - 실시간 매물 데이터 분석기</title>
  <meta name="description" content="네이버 부동산 매물을 실시간으로 분석하여 가격, 평형, 층 정보를 표로 정리해 드립니다.">
  <link href='/style.css' rel='stylesheet'>
  <style>
    /* 추가적인 스타일 보정 */
    .search-hint { font-size: 0.8rem; color: var(--placeholder-text); margin-top: 5px; }
    .status-msg { margin: 10px 0; font-weight: 600; }
    .status-error { color: #e74c3c; }
    .status-success { color: #27ae60; }
    .direct-link-box { 
      background: var(--accent-color); 
      padding: 1.5rem; 
      border-radius: 12px; 
      margin-top: 2rem; 
      display: none;
      border: 2px dashed var(--btn-bg);
    }
  </table-wrapper>
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="/" class="nav-logo">Ravelist 부동산</a>
    </div>
  </nav>

  <div class="container main-content">
    <div class="theme-toggle">
      <button id="theme-btn" aria-label="Toggle theme">🌙</button>
    </div>

    <section id="search-section">
      <h1>네이버 부동산 매물 분석기</h1>
      <p class="subtitle">원하는 지역(동, 구)을 입력하면 실시간 매물을 표로 정리합니다.</p>
      
      <div class="search-card">
        <div class="search-input-group">
          <input type="text" id="region-input" placeholder="예: 역삼동, 반포동, 분당구 등" autofocus>
          <button id="search-btn">데이터 분석 시작</button>
        </div>
        <p class="search-hint">※ 동 이름(예: '역삼동') 또는 구 이름(예: '강남구')을 입력하세요.</p>
        <div class="quick-links">
          <button class="quick-btn" data-query="역삼동">역삼동</button>
          <button class="quick-btn" data-query="반포동">반포동</button>
          <button class="quick-btn" data-query="판교동">판교동</button>
          <button class="quick-btn" data-query="해운대">해운대</button>
          <button class="quick-btn" data-query="성수동">성수동</button>
        </div>
      </div>
      
      <div id="loading" class="loading-overlay" style="display: none;">
        <div class="spinner"></div>
        <div id="status-text" class="status-msg">지역 코드를 확인 중...</div>
      </div>

      <div id="results-container" class="results-container" style="display: none;">
        <div class="results-header">
          <h2 id="results-title">실시간 매물 리스트</h2>
          <span id="results-count" class="badge">0건</span>
        </div>
        <div class="table-wrapper">
          <table id="listings-table">
            <thead>
              <tr>
                <th>매물명</th>
                <th>유형</th>
                <th>동</th>
                <th>평형</th>
                <th>층</th>
                <th>가격</th>
                <th>중개사</th>
                <th>등록일</th>
                <th>상세</th>
              </tr>
            </thead>
            <tbody id="listings-body"></tbody>
          </table>
        </div>
        
        <div id="direct-link-box" class="direct-link-box">
          <p>표 데이터를 불러오는 데 제한이 발생했습니다. (네이버 보안 정책)</p>
          <p>대신 아래 버튼을 누르면 **해당 지역의 필터링된 결과**를 바로 확인하실 수 있습니다.</p>
          <a href="#" id="naver-link" target="_blank" class="btn-primary">네이버 부동산에서 결과 보기</a>
        </div>
      </div>
    </section>

    <hr class="divider">

    <section class="info-section">
      <article>
        <h2>네이버 부동산 실시간 분석 안내</h2>
        <p>본 서비스는 네이버 부동산에 등록된 현재 매물 정보를 수집하여 가격과 평당 시세를 비교하기 좋게 표 형태로 재구성합니다. 네트워크 환경에 따라 수집 속도가 차이 날 수 있으며, 정보의 정확성을 위해 상세 버튼을 눌러 실제 매물을 확인하시기 바랍니다.</p>
      </article>
    </section>
  </div>

  <footer class="footer">
    <div class="footer-container">
      <p>&copy; 2026 Ravelist Real Estate. All rights reserved.</p>
    </div>
  </footer>

  <script defer src="/main.js"></script>
</body>
</html>
