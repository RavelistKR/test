<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ravelist Results</title>
  <meta name="description" content="Ravelist 부동산 분석 결과 페이지">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    }

    :root {
      --bg: #f8fafc;
      --panel: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --line: #e2e8f0;
      --accent: #0f172a;
      --soft: #eef2ff;
    }

    [data-theme="dark"] {
      --bg: #020617;
      --panel: #0f172a;
      --text: #f8fafc;
      --muted: #94a3b8;
      --line: #1e293b;
      --accent: #f8fafc;
      --soft: #111827;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(rgba(15, 23, 42, 0.04) 1px, transparent 1px), var(--bg);
      background-size: 24px 24px;
      color: var(--text);
    }

    .shell {
      max-width: 1120px;
      margin: 0 auto;
      padding: 2rem;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin-bottom: 3rem;
    }

    .brand {
      color: var(--text);
      text-decoration: none;
      font-weight: 900;
      letter-spacing: 2px;
    }

    .theme-button {
      background: transparent;
      border: 1px solid var(--line);
      border-radius: 999px;
      width: 42px;
      height: 42px;
      cursor: pointer;
      color: var(--text);
    }

    .hero {
      display: grid;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .eyebrow {
      color: var(--muted);
      font-size: 0.9rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 4rem);
      line-height: 1.05;
      letter-spacing: -0.04em;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
      margin: 2rem 0 1.5rem;
    }

    .summary-card,
    .notice,
    .empty,
    .listing-card {
      background: var(--panel);
      border: 1px solid var(--line);
    }

    .summary-card {
      padding: 1.25rem;
    }

    .summary-label {
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 0.5rem;
    }

    .summary-value {
      font-size: 1.25rem;
      font-weight: 700;
    }

    .notice {
      padding: 1rem 1.25rem;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    .results-grid {
      display: grid;
      gap: 1rem;
    }

    .listing-card {
      padding: 1.5rem;
      display: grid;
      gap: 0.9rem;
    }

    .listing-head {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      align-items: start;
    }

    .listing-title {
      font-size: 1.15rem;
      font-weight: 800;
    }

    .listing-price {
      font-size: 1.15rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .pill-row {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .pill {
      border-radius: 999px;
      padding: 0.4rem 0.75rem;
      background: var(--soft);
      color: var(--muted);
      font-size: 0.85rem;
    }

    .listing-meta {
      color: var(--muted);
      line-height: 1.6;
    }

    .empty {
      padding: 2rem;
      color: var(--muted);
    }

    .loading {
      padding: 3rem 0;
      color: var(--muted);
    }

    @media (max-width: 768px) {
      .shell {
        padding: 1.25rem;
      }

      .topbar {
        margin-bottom: 2rem;
      }

      .listing-head {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <a href="/" class="brand">RAVELIST / REAL ESTATE</a>
      <button id="theme-btn" class="theme-button" aria-label="Toggle theme">🌙</button>
    </div>

    <section class="hero">
      <div class="eyebrow">Analysis Result</div>
      <h1 id="page-title">지역 분석 결과를 불러오는 중입니다.</h1>
      <p id="page-subtitle" style="color: var(--muted); max-width: 720px;">
        Worker API를 통해 매물 데이터를 가져와 이 페이지에 정리합니다.
      </p>
    </section>

    <section id="summary" class="summary"></section>
    <section id="notice" class="notice" style="display: none;"></section>
    <section id="results" class="results-grid"></section>
  </div>

  <script defer src="/results.js"></script>
</body>
</html>
